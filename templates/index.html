<!DOCTYPE html>
<html>
<head>
    <title>Airbnb Price Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff5a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #e0484d;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="{{ url_for('static', filename='airbb.jpeg') }}" class="logo">

    <h2>🏡 Airbnb Price Predictor</h2>

    <form method="POST">
        <label>Bedrooms</label>
        <input type="number" name="bedrooms" required>

        <label>Bathrooms</label>
        <input type="number" name="bathrooms" required>

        <label>Accommodates</label>
        <input type="number" name="accommodates" required>

        <label>Amenities</label>
        <input type="number" name="amenities" required>

        <button type="submit">Predict Price</button>
    </form>

    {% if result %}
        <div class="result">
            💰 Predicted Price: ${{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
